# Tmux configuration with Catppuccin Macchiato theme

# Environment variables to pass to tmux sessions
set -g update-environment "\
    DISPLAY \
    SSH_CLIENT \
    SSH_AUTH_SOCK \
    SSH_AGENT_PID \
    SSH_CONNECTION \
    XAUTHORITY "

# Basic settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Enable xterm keys for better compatibility with Vim and other applications
setw -g xterm-keys on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows 1

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Keep updated quietly
set -g bell-action none
setw -g monitor-activity on
set -g visual-activity off

# Increase scrollback buffer size
set -g history-limit 10000

# Escape time for vim
set -sg escape-time 0

# Enable status bar
set -g status on

# Set title
set -g set-titles on
set -g set-titles-string '#W@#h'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#latest'

set -g @catppuccin_flavor 'macchiato'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
